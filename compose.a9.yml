name: iotedu-anonshield

services:
  db:
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports: !reset []
    volumes:
      - iotedu_db_data:/var/lib/mysql

  backend:
    ports: !reset []

  frontend:
    ports: !reset []

  sse_server:
    build: ./ids/ids_log_monitor
    volumes:
      - ./ids/logs:/ids/logs:ro
    restart: unless-stopped

  zeek:
    environment:
      ZEEK_INTERFACE: bridge-tap
      ZEEK_DISABLE_METRICS: "1"

volumes:
  iotedu_db_data:
