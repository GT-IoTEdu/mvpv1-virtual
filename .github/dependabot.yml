version: 2
# Dependabot: agrupa minor/patch numa PR só por ecossistema → reduz drasticamente
# o número de branches abertas. Major fica em PR separada (alto impacto).
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels: [security, dependencies]
    groups:
      backend-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels: [security, dependencies]
    groups:
      frontend-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels: [security, dependencies]

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels: [security, dependencies]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels: [ci]
    groups:
      actions-all:
        patterns: ["*"]
