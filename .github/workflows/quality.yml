name: Quality & Security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Roda 1x por dia mesmo sem push — pega CVEs novos em deps existentes
    - cron: "0 6 * * *"

permissions:
  contents: read
  security-events: write

jobs:

  trivy:
    name: Trivy — vulnerabilities (filesystem + Dockerfiles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan (SARIF → Security tab)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
      - name: Trivy human-readable summary
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  gitleaks:
    name: Gitleaks — secrets vazados
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # precisa do histórico completo
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pylint-bandit:
    name: Python — bandit (security) + ruff (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install tools
        run: pip install --quiet bandit ruff
      - name: Bandit (security issues)
        continue-on-error: true
        run: bandit -r backend --skip B101,B104,B311 -f txt -o bandit.txt && cat bandit.txt
      - name: Ruff (style + bug-prone patterns)
        continue-on-error: true
        run: ruff check backend --output-format=concise

  npm-audit:
    name: Frontend — npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: npm audit (frontend)
        continue-on-error: true
        working-directory: frontend
        run: npm audit --audit-level=high
