name: Deploy to a9

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-a9
  cancel-in-progress: false

jobs:
  deploy:
    if: github.repository == 'CristhianKapelinski/wticifes2026-iotedu'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.A9_SSH_PRIVATE_KEY }}
          KNOWN_HOSTS: ${{ secrets.A9_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Trigger deploy on a9
        env:
          A9_HOST: ${{ secrets.A9_HOST }}
          A9_USER: ${{ secrets.A9_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "$A9_USER@$A9_HOST" \
            "cd /home/cristhian/wticifes2026-iotedu \
             && git fetch --quiet origin main \
             && git reset --hard origin/main \
             && bash scripts/a9-deploy.sh"
