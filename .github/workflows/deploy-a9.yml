name: Deploy to a9

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-a9
  cancel-in-progress: false

jobs:
  deploy:
    if: github.repository == 'GT-IoTEdu/mvpv1-virtual'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.A9_SSH_PRIVATE_KEY }}
          KNOWN_HOSTS: ${{ secrets.A9_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - uses: actions/checkout@v4

      - name: Sync repo to a9 and deploy
        env:
          A9_HOST: ${{ secrets.A9_HOST }}
          A9_USER: ${{ secrets.A9_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "$A9_USER@$A9_HOST" 'mkdir -p /home/cristhian/wticifes2026-iotedu'
          rsync -az --delete \
                --exclude='.git' --exclude='backend/.env' --exclude='.env' \
                --exclude='ids/logs' --exclude='.deploy.lock' \
                -e "ssh -i $HOME/.ssh/id_ed25519" \
                ./ "$A9_USER@$A9_HOST:/home/cristhian/wticifes2026-iotedu/"
          ssh -i ~/.ssh/id_ed25519 "$A9_USER@$A9_HOST" \
            'bash /home/cristhian/wticifes2026-iotedu/scripts/a9-deploy.sh'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run API integration tests against production
        working-directory: tests
        env:
          BASE_URL: https://iotedu.anonshield.org
        run: |
          npm install --silent
          npm test

      - name: Publish test report (a9)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: API tests — a9 (iotedu.anonshield.org)
          path: tests/junit.xml
          reporter: jest-junit
          fail-on-error: true
